# ================================================================
# Neo4j 온톨로지 통합 환경 (Windows Docker Desktop)
# ================================================================
# 포함: Neo4j 2025 + APOC + GDS + neosemantics(n10s)
# 용도: 온톨로지 구축, GraphRAG, 그래프 알고리즘
# ================================================================
#
# 사전 준비:
#   1. Docker Desktop for Windows 설치 (WSL 2 백엔드 권장)
#   2. Docker Desktop → Settings → Resources → Memory: 4GB 이상
#   3. 이 파일이 있는 폴더에 documents/ 폴더 생성
#
# 실행:
#   docker-compose up -d
#
# 접속:
#   Browser UI:  http://localhost:7474
#   Bolt:        bolt://localhost:7687
#   ID/PW:       neo4j / ontology2025!
#
# 중지:
#   docker-compose down          (데이터 유지)
#   docker-compose down -v       (데이터 삭제)
#
# 로그 확인:
#   docker-compose logs -f neo4j
#
# ================================================================

version: '3.8'

services:
  neo4j:
    image: neo4j:2025.02.0-enterprise
    container_name: neo4j-ontology
    restart: unless-stopped
    ports:
      - "7474:7474"    # Neo4j Browser UI
      - "7687:7687"    # Bolt Protocol (앱 연결용)
    environment:
      # ── 인증 ──
      - NEO4J_AUTH=neo4j/ontology2025!

      # ── Enterprise 라이선스 (개발/평가 무료) ──
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes

      # ── 플러그인 자동 설치 ──
      - NEO4J_PLUGINS=["apoc", "graph-data-science", "n10s"]

      # ── 플러그인 보안 허용 ──
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*,n10s.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*,n10s.*

      # ── 메모리 설정 (4GB RAM 기준, 환경에 맞게 조정) ──
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m

      # ── APOC 설정 ──
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true

      # ── 파일 임포트 허용 (OWL, CSV 등) ──
      - NEO4J_server_directories_import=import

    volumes:
      # ── 데이터 영속성 (컨테이너 재시작해도 유지) ──
      - neo4j_data:/data
      - neo4j_logs:/logs

      # ── 임포트 폴더 (OWL, CSV, Cypher 파일 넣는 곳) ──
      # Windows 경로 예시: C:\Users\username\ontology-project\import
      - ./import:/var/lib/neo4j/import

      # ── 문서 폴더 (원본 DOCX 보관용) ──
      - ./documents:/documents

    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p 'ontology2025!' 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  neo4j_data:
    name: neo4j_ontology_data
  neo4j_logs:
    name: neo4j_ontology_logs